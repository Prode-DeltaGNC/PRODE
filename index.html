<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>PRODE DELTA GNC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: radial-gradient(circle at top, #4fc3ff, #0b3d91 35%, #0a6b38 75%, #06351b); min-height: 100vh; }
        .card { animation: up .8s ease }
        @keyframes up { from { opacity: 0; transform: translateY(40px) } to { opacity: 1; transform: none } }
        .glow { text-shadow: 0 0 10px #fff, 0 0 25px #ffd700 }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="flex flex-col items-center p-4">

<div id="pantalla-principal" class="text-center card mt-4 w-full max-w-xl">
    <h1 class="text-6xl font-black italic text-yellow-300 glow">DELTA GNC</h1>
    <h2 class="text-3xl font-black text-white mt-2">PRODE ARGENTINA 2026</h2>
    
    <div class="flex justify-center items-center gap-8 my-8">
        <div class="text-center"><div class="text-[70px]">🇦🇷</div><div class="text-white font-black text-xl">ARGENTINA</div></div>
        <div class="text-white text-4xl font-black">VS</div>
        <div class="text-center"><div class="text-[70px]">🇯🇴</div><div class="text-white font-black text-xl">JORDANIA</div></div>
    </div>

    <div class="space-y-3 mb-8">
        <div id="fechaPartido" class="inline-block bg-black/40 text-white rounded-full px-6 py-2 text-lg font-black">
            📅 SÁBADO 27/06 | ⏰ 23:00 HS
        </div>
        <div class="text-yellow-300 font-black text-lg italic uppercase">PARTICIPA POR UN 50% DESCUENTO EN TU CARGA DE GNC</div>
    </div>

    <div class="bg-white rounded-3xl p-6 border-4 border-sky-400 shadow-2xl mb-5">
        <div class="text-center text-lg font-black text-sky-900 mb-1">PATENTE</div>
        <input id="patente" maxlength="7" class="w-full text-center uppercase text-5xl font-black outline-none" placeholder="ABC123">
    </div>

    <div class="grid grid-cols-2 gap-5 mb-8">
        <div class="bg-sky-100 rounded-3xl p-4 border-4 border-sky-400">
            <div class="text-center font-black text-sky-900">ARGENTINA</div>
            <input id="arg" type="number" inputmode="numeric" class="w-full text-center text-6xl font-black bg-transparent outline-none">
        </div>
        <div class="bg-yellow-300 rounded-3xl p-4 border-4 border-yellow-500">
            <div class="text-center font-black text-yellow-900">JORDANIA</div>
            <input id="rival" type="number" inputmode="numeric" class="w-full text-center text-6xl font-black bg-transparent outline-none">
        </div>
    </div>

    <button onclick="generarTodo()" class="w-full bg-green-600 active:scale-95 transition text-white text-3xl font-black rounded-3xl py-6 shadow-xl">
        📲 ENVIAR Y GENERAR QR
    </button>
</div>

<div id="pantalla-qr" class="hidden card text-center mt-4 w-full max-w-xl bg-white p-6 rounded-3xl">
    <h2 class="text-2xl font-black text-sky-900 mb-4">CUPÓN LISTO</h2>
    <div id="qrcode" class="flex justify-center mb-4"></div>
    <div id="contenedor-botones"></div>
</div>

<script>
    let pasoFinalizado = false;

    function validarPatente(patente) {
        return /^[A-Z]{3}\d{3}$/.test(patente) || /^[A-Z]{2}\d{3}[A-Z]{2}$/.test(patente);
    }
// 5. Verificación de habilitación (Restringido al horario solicitado)
function verificarHabilitacion() {
    const ahora = new Date();
    // Año 2026, Mes 5 (Junio es el mes 5 porque empieza en 0), Día 26, Hora 06
    const inicio = new Date(2026, 5, 24, 6, 0, 0); 
    const fin = new Date(2026, 5, 25, 6, 0, 0);
    
    const boton = document.querySelector("button[onclick='generarTodo()']");
    const inputs = document.querySelectorAll("input");

    if (ahora < inicio || ahora >= fin) {
        // Deshabilitar todo
        boton.disabled = true;
        boton.innerHTML = "⛔ PRODE CERRADO";
        boton.style.background = "#888";
        inputs.forEach(input => input.disabled = true);
        
        // Mostrar aviso al usuario
        alert("⚠️ PRODE NO DISPONIBLE\n\nEl horario para participar es:\nDesde: 26/06 a las 06:00 HS\nHasta: 27/06 a las 06:00 HS");
    }
}

// Ejecutar al cargar la página
window.onload = verificarHabilitacion;
    function generarTodo() {
        const patente = document.getElementById("patente").value.trim().toUpperCase();
        const arg = document.getElementById("arg").value;
        const rival = document.getElementById("rival").value;
        
        if(!patente || arg === "" || rival === ""){ alert("Completá todos los campos."); return; }
        if (!validarPatente(patente)) { alert("⛔ Formato de patente inválido."); return; }

        const registros = JSON.parse(localStorage.getItem('prode_registros') || '{}');
        if (registros[patente]) { alert("⛔ Esta patente ya participó."); return; }

        // Registrar
        registros[patente] = true; 
        localStorage.setItem('prode_registros', JSON.stringify(registros));

        // Preparar UI
        document.getElementById("pantalla-principal").classList.add("hidden");
        document.getElementById("pantalla-qr").classList.remove("hidden");
        
        const fecha = new Date().toLocaleDateString();
        const datosQR = `PRODE DELTA GNC | Patente: ${patente} | Pronostico: ${arg}-${rival} | ${fecha}`;
        new QRCode(document.getElementById("qrcode"), { 
    text: datosQR, 
    width: 200, 
    height: 200, 
    useSVG: false 
});

        // Crear botón de descarga
        const btnDescarga = document.createElement("button");
        btnDescarga.innerText = "📥 1. DESCARGAR CUPÓN";
        btnDescarga.className = "w-full bg-sky-600 text-white font-black py-4 rounded-3xl mb-4 text-xl";
        btnDescarga.onclick = () => {
            guardarCupon(patente, `${arg}-${rival}`, document.getElementById("fechaPartido").innerText.replace("📅", "").replace("⏰", ""));
            mostrarBotonWp(patente, `${arg}-${rival}`);
        };
        document.getElementById("contenedor-botones").appendChild(btnDescarga);
    }

    function mostrarBotonWp(patente, pronostico) {
        const contenedor = document.getElementById("contenedor-botones");
        contenedor.innerHTML = ""; // Limpiar
        
        const mensaje = encodeURIComponent(`🇦🇷 *PRODE DELTA GNC*\n\n⚽ Partido: ARGENTINA VS JORDANIA\n🚗 Patente: ${patente}\n📊 Pronostico: ${pronostico}\n🎁 ¡Participá por 50%OFF!`);
        
        const btnWp = document.createElement("a");
        btnWp.href = `https://wa.me/5491127098175?text=${mensaje}`;
        btnWp.target = "_blank";
        btnWp.innerText = "📲 2. ENVIAR POR WHATSAPP";
        btnWp.className = "block w-full bg-green-600 text-white font-black py-4 rounded-3xl text-xl";
        btnWp.onclick = () => {
            alert("✅ ¡Gracias por participar! No olvides guardar tu cupón descargado para el canje.");
            document.body.innerHTML = "<h1 style='text-align:center; margin-top:100px; color:white;'>PARTICIPACIÓN COMPLETADA</h1>";
        };
        contenedor.appendChild(btnWp);
    }

   function guardarCupon(patente, pronostico, infoFecha){
    const canvas = document.createElement("canvas");
    // Mantenemos el tamaño, pero organizaremos mejor el espacio
    canvas.width = 900; canvas.height = 1850;
    const ctx = canvas.getContext("2d");
    
    // --- FUNCIÓN AUXILIAR PARA SALTOS DE LÍNEA ---
    // Esta función se encarga de que los textos largos no se corten
    function wrapText(context, text, x, y, maxWidth, lineHeight) {
        const words = text.split(' ');
        let line = '';
        let currentY = y;

        for(let n = 0; n < words.length; n++) {
            let testLine = line + words[n] + ' ';
            let metrics = context.measureText(testLine);
            let testWidth = metrics.width;
            if (testWidth > maxWidth && n > 0) {
                context.fillText(line, x, currentY);
                line = words[n] + ' ';
                currentY += lineHeight;
            }
            else {
                line = testLine;
            }
        }
        context.fillText(line, x, currentY);
        return currentY; // Devuelve la última posición Y utilizada
    }
    // ----------------------------------------------

    // 1. Diseño base y Fondo
    ctx.fillStyle = "#fdfdfd"; // Blanco ligeramente roto para mejor contraste
    ctx.fillRect(0, 0, 900, 1850);
    
    // Borde principal (Color Verde Gas)
    ctx.strokeStyle = "#0a6b38"; 
    ctx.lineWidth = 20; 
    ctx.strokeRect(30, 30, 840, 1790);

    // Encabezado (Header)
    ctx.fillStyle = "#0a6b38"; 
    ctx.fillRect(30, 30, 840, 180);
    
    ctx.fillStyle = "white"; 
    ctx.textAlign = "center"; 
    ctx.font = "bold 80px Arial"; 
    ctx.fillText("DELTA GNC", 450, 125);
    ctx.font = "bold 35px Arial"; 
    ctx.fillText("CUPÓN DE PARTICIPACIÓN - PRODE", 450, 175);
    
    // 2. Info del Partido
    ctx.fillStyle = "#333";
    ctx.font = "bold 50px Arial"; 
    ctx.fillText("ARGENTINA vs JORDANIA", 450, 280);
    
    ctx.fillStyle = "#666";
    ctx.font = "35px Arial"; 
    ctx.fillText("SÁBADO 27/06 | ⏰ 23:00 HS", 450, 335);

    // Línea divisoria decorativa
    ctx.strokeStyle = "#ddd"; 
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(100, 380); ctx.lineTo(800, 380); ctx.stroke();
    
    // 3. Datos del Usuario (Sección limpia)
    ctx.textAlign = "left";
    ctx.fillStyle = "#000";
    ctx.font = "bold 40px Arial"; 
    
    // Ajuste de tabulación para que queden alineados los dos puntos
    const tabDatos = 420;
    ctx.fillText("TU PATENTE:", 100, 460);
    ctx.fillStyle = "#0b3d91"; // Azul para resaltar dato
    ctx.font = "bold 50px Courier New"; // Fuente tipo patente
    ctx.fillText(patente, tabDatos, 460);

    ctx.fillStyle = "#000";
    ctx.font = "bold 40px Arial"; 
    ctx.fillText("TU PRONÓSTICO:", 100, 530);
    ctx.fillStyle = "#c62828"; // Rojo para resaltar resultado
    ctx.font = "bold 60px Arial";
    ctx.fillText(pronostico, tabDatos, 535);

    ctx.fillStyle = "#666";
    ctx.font = "30px Arial"; 
    ctx.fillText("Emitido el: " + new Date().toLocaleDateString() + " " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}), 100, 600);

    // 4. Sección Premio (Destacada)
    // Fondo gris suave para el recuadro de premio
    ctx.fillStyle = "#f4f4f4";
    ctx.fillRect(80, 650, 740, 250);
    ctx.strokeStyle = "#ffd700"; // Borde dorado
    ctx.lineWidth = 5;
    ctx.strokeRect(80, 650, 740, 250);

    ctx.textAlign = "center";
    ctx.fillStyle = "#c62828"; 
    ctx.font = "bold 50px Arial"; 
    ctx.fillText("🎁 ¡PREMIO!", 450, 720);
    
    ctx.fillStyle = "#333"; 
    ctx.font = "bold 32px Arial"; 
    
    // Usamos wrapText para las condiciones del premio, que suelen ser largas
    const textoPremio = "Si acertás el resultado, ganás 50% OFF en tu próxima carga de GNC.";
    wrapText(ctx, textoPremio, 450, 780, 700, 40);

    ctx.fillStyle = "#0b3d91"; 
    ctx.font = "italic bold 30px Arial"; 
    ctx.fillText("Válido para canjear del 28/06(06 AM) al 30/06(06 AM).", 450, 860);
    
    // 5. DIBUJO DEL QR
    // Lo centramos y le damos un tamaño adecuado
    ctx.fillStyle = "#000";
    ctx.font = "bold 35px Arial";
    ctx.fillText("ESCANEAR EN PLAYA", 450, 980);

    const qrCanvas = document.querySelector("#qrcode canvas");
    if (qrCanvas) {
        // Centrado: (AnchoCanvas - AnchoQR) / 2
        // Dibujamos el QR con un tamaño de 450x450
        ctx.drawImage(qrCanvas, 225, 1020, 450, 450);
    }
    
    // 6. Pie de página (Términos y Condiciones - CRÍTICO)
    // Línea de puntos simulada
    ctx.strokeStyle = "#aaa"; 
    ctx.setLineDash([15, 10]); 
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(50, 1530); ctx.lineTo(850, 1530); ctx.stroke();
    ctx.setLineDash([]); // Resetear estilo de línea

    ctx.fillStyle = "#666";
    ctx.font = "bold 28px Arial"; 
    ctx.fillText("TÉRMINOS Y CONDICIONES", 450, 1580);

    ctx.font = "24px Arial"; ctx.fillStyle = "#888";
    
    // ESTE ES EL TEXTO QUE SE CORTABA. Ahora con wrapText se ajusta.
    const textosLegales = [
        "• Indispensable presentar este cupón para acreditar el premio.",
        "• El descuento del 50% se aplica sobre una única carga de GNC.",
        "• Promoción válida únicamente en DELTA GNC.",
        "• No acumulable con otras promociones vigentes.",
        "• La participación implica la aceptación de todas las bases del concurso."
    ];

    let yLegales = 1620;
    // Ancho máximo para el texto legal (dejando márgenes)
    const anchoMaxLegal = 750; 
    const interlineado = 35;

    textosLegales.forEach(texto => {
        // wrapText devuelve la última Y, le sumamos un extra para el siguiente punto
        yLegales = wrapText(ctx, texto, 450, yLegales, anchoMaxLegal, interlineado) + 15;
    });

    // Mensaje final de agradecimiento
    ctx.fillStyle = "#0a6b38"; 
    ctx.font = "italic bold 26px Arial"; 
    ctx.fillText("¡Gracias por confiar en DELTA GNC! ¡Mucha suerte!", 450, 1810);
    
    // 7. Descarga automática
    const link = document.createElement("a"); 
    link.download = `Cupon_Prode_DELTA_${patente}.png`; // Nombre de archivo dinámico
    link.href = canvas.toDataURL("image/png"); 
    link.click();
}
</script>
</body>
</html>
