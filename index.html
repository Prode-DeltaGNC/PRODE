<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>PRODE DELTA GNC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: radial-gradient(circle at top, #4fc3ff, #0b3d91 35%, #0a6b38 75%, #06351b); min-height: 100vh; }
        .card { animation: up .8s ease }
        @keyframes up { from { opacity: 0; transform: translateY(40px) } to { opacity: 1; transform: none } }
        .glow { text-shadow: 0 0 10px #fff, 0 0 25px #ffd700 }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="flex flex-col items-center p-4">

<div id="pantalla-principal" class="text-center card mt-4 w-full max-w-xl">
    <h1 class="text-6xl font-black italic text-yellow-300 glow">DELTA GNC</h1>
    <h2 class="text-3xl font-black text-white mt-2">PRODE ARGENTINA 2026</h2>
    <div id="info-fechas" class="text-white text-sm font-bold opacity-80 mb-1">
        Habilitado desde el 14/07 06:00 hs hasta el 15/07 10:00 hs
    </div>
    <div id="contador" class="text-white font-black text-xl my-4 bg-red-600/50 p-2 rounded-lg">
        Cargando tiempo...
    </div>
    <div class="flex justify-center items-center gap-8 my-8">
        <div class="text-center"><div class="text-[70px]">🇦🇷</div><div class="text-white font-black text-xl">ARGENTINA</div></div>
        <div class="text-white text-4xl font-black">VS</div>
<div class="text-center"><div class="text-[70px]">🏴󠁧󠁢󠁥󠁮󠁧󠁿</div><div class="text-white font-black text-xl">INGLATERRA</div></div>
    <div class="space-y-3 mb-8">
        <div id="fechaPartido" class="inline-block bg-black/40 text-white rounded-full px-6 py-2 text-lg font-black">
            📅 MIERCOLES 15/07 | ⏰ 16:00 HS
        </div>
        <div class="text-yellow-300 font-black text-lg italic uppercase">PARTICIPA POR UN 50% DESCUENTO EN TU CARGA DE GNC</div>
    </div>

    <div class="bg-white rounded-3xl p-6 border-4 border-sky-400 shadow-2xl mb-5">
        <div class="text-center text-lg font-black text-sky-900 mb-1">PATENTE</div>
        <input id="patente" maxlength="7" class="w-full text-center uppercase text-5xl font-black outline-none" placeholder="ABC123">
    </div>
    <div class="grid grid-cols-2 gap-5 mb-8">
        <div class="bg-sky-100 rounded-3xl p-4 border-4 border-sky-400">
            <div class="text-center font-black text-sky-900">ARGENTINA</div>
            <input id="arg" type="number" class="w-full text-center text-6xl font-black bg-transparent outline-none">
        </div>
        <div class="bg-yellow-300 rounded-3xl p-4 border-4 border-yellow-500">
            <div class="text-center font-black text-yellow-900">INGLATERRA</div>
            <input id="rival" type="number" class="w-full text-center text-6xl font-black bg-transparent outline-none">
        </div>
    </div>

    <button onclick="generarTodo()" class="w-full bg-green-600 active:scale-95 transition text-white text-3xl font-black rounded-3xl py-6 shadow-xl">
        📲 ENVIAR Y GENERAR QR
    </button>
</div>

<div id="pantalla-qr" class="hidden card text-center mt-4 w-full max-w-xl bg-white p-6 rounded-3xl">
    <h2 class="text-2xl font-black text-sky-900 mb-4">CUPÓN LISTO</h2>
    <div id="qrcode" class="flex justify-center mb-4"></div>
    <div id="contenedor-botones"></div>
</div>

<script>
    const KEY_REGISTROS = 'prode_2026_julio_15';

    function validarPatente(patente) {
        return /^[A-Z]{3}\d{3}$/.test(patente) || /^[A-Z]{2}\d{3}[A-Z]{2}$/.test(patente);
    }

    function verificarHabilitacion() {
        const ahora = new Date();
        const inicio = new Date(2026, 6, 13, 6, 0, 0);
        const fin = new Date(2026, 6, 15, 10, 0, 0);
        
        const boton = document.querySelector("button[onclick='generarTodo()']");
        const inputs = document.querySelectorAll("input");

        if (ahora < inicio || ahora >= fin) {
            boton.disabled = true;
            boton.innerHTML = "⛔ PRODE CERRADO";
            boton.style.background = "#888";
            inputs.forEach(input => input.disabled = true);
        } else {
            boton.disabled = false;
            boton.innerHTML = "📲 ENVIAR Y GENERAR QR";
            boton.style.background = "#16a34a";
            inputs.forEach(input => input.disabled = false);
        }
    }

    function iniciarContador() {
        const inicio = new Date(2026, 6, 14, 6, 0, 0).getTime();
        const fin = new Date(2026, 6, 15, 10, 0, 0).getTime();
        const divContador = document.getElementById("contador");
        const x = setInterval(function() {
            const ahora = new Date().getTime();
            let distancia, texto, colorFondo;

            if (ahora < inicio) {
                distancia = inicio - ahora;
                texto = "⏳ FALTA PARA JUGAR: ";
                colorFondo = "bg-sky-600/50";
            } else if (ahora >= inicio && ahora < fin) {
                distancia = fin - ahora;
                texto = "⏳ CIERRA EN: ";
                colorFondo = "bg-red-600/80";
            } else {
                clearInterval(x);
                divContador.innerHTML = "⛔ PRODE CERRADO";
                divContador.className = "text-white font-black text-xl my-4 bg-gray-600/50 p-2 rounded-lg";
                verificarHabilitacion();
                return;
            }

            const horas = Math.floor(distancia / (1000 * 60 * 60));
            const minutos = Math.floor((distancia % (1000 * 60 * 60)) / (1000 * 60));
            const segundos = Math.floor((distancia % (1000 * 60)) / 1000);
            divContador.innerHTML = `${texto} ${horas}h ${minutos}m ${segundos}s`;
            divContador.className = `text-white font-black text-xl my-4 ${colorFondo} p-2 rounded-lg`;
            verificarHabilitacion();
        }, 1000);
    }

    window.onload = function() {
        verificarHabilitacion();
        iniciarContador();
    };

    function generarTodo() {
        const patente = document.getElementById("patente").value.trim().toUpperCase();
        const arg = document.getElementById("arg").value;
        const rival = document.getElementById("rival").value;
        
        if(!patente || arg === "" || rival === ""){ alert("Completá todos los campos."); return; }
        if (!validarPatente(patente)) { alert("⛔ Formato de patente inválido."); return; }

        const registros = JSON.parse(localStorage.getItem(KEY_REGISTROS) || '{}');
        if (registros[patente]) { alert("⛔ Esta patente ya participó."); return; }

        registros[patente] = true;
        localStorage.setItem(KEY_REGISTROS, JSON.stringify(registros));

        document.getElementById("pantalla-principal").classList.add("hidden");
        document.getElementById("pantalla-qr").classList.remove("hidden");
        
        const datosQR = `PRODE DELTA GNC | Patente: ${patente} | Pronostico: ${arg}-${rival}`;
        new QRCode(document.getElementById("qrcode"), { text: datosQR, width: 200, height: 200, useSVG: false });

        const btnDescarga = document.createElement("button");
        btnDescarga.innerText = "📥 1. DESCARGAR CUPÓN";
        btnDescarga.className = "w-full bg-sky-600 text-white font-black py-4 rounded-3xl mb-4 text-xl";
        btnDescarga.onclick = () => {
            guardarCupon(patente, `${arg}-${rival}`);
            mostrarBotonWp(patente, `${arg}-${rival}`);
        };
        document.getElementById("contenedor-botones").appendChild(btnDescarga);
    }

    function mostrarBotonWp(patente, pronostico) {
        const contenedor = document.getElementById("contenedor-botones");
        const btnWp = document.createElement("a");
        const mensaje = encodeURIComponent(`🇦🇷 *PRODE DELTA GNC*\n\n⚽ Partido: ARGENTINA VS INGLATERRA\n🚗 Patente: ${patente}\n📊 Pronostico: ${pronostico}\n🎁 ¡Participá por 50%OFF!`);
        btnWp.href = `https://wa.me/5491127098175?text=${mensaje}`;
        btnWp.target = "_blank";
        btnWp.innerText = "📲 2. ENVIAR POR WHATSAPP";
        btnWp.className = "block w-full bg-green-600 text-white font-black py-4 rounded-3xl text-xl mt-4";
        contenedor.appendChild(btnWp);
    }

    function guardarCupon(patente, pronostico){
        const canvas = document.createElement("canvas");
        canvas.width = 900; canvas.height = 1850;
        const ctx = canvas.getContext("2d");
        
        function wrapText(context, text, x, y, maxWidth, lineHeight) {
            const words = text.split(' ');
            let line = '';
            let currentY = y;
            for(let n = 0; n < words.length; n++) {
                let testLine = line + words[n] + ' ';
                let metrics = context.measureText(testLine);
                if (metrics.width > maxWidth && n > 0) {
                    context.fillText(line, x, currentY);
                    line = words[n] + ' ';
                    currentY += lineHeight;
                } else { line = testLine; }
            }
            context.fillText(line, x, currentY);
            return currentY;
        }

        ctx.fillStyle = "#fdfdfd"; ctx.fillRect(0, 0, 900, 1850);
        ctx.strokeStyle = "#0a6b38"; ctx.lineWidth = 20; ctx.strokeRect(30, 30, 840, 1790);
        ctx.fillStyle = "#0a6b38"; ctx.fillRect(30, 30, 840, 180);
        ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = "bold 80px Arial"; ctx.fillText("DELTA GNC", 450, 125);
        ctx.font = "bold 35px Arial"; ctx.fillText("CUPÓN DE PARTICIPACIÓN - PRODE", 450, 175);
        ctx.fillStyle = "#333"; ctx.font = "bold 50px Arial"; ctx.fillText("ARGENTINA vs INGLATERRA", 450, 280);
        ctx.fillStyle = "#666"; ctx.font = "35px Arial"; ctx.fillText("MIERCOLES 15/07 | ⏰ 16:00 HS", 450, 335);
        ctx.strokeStyle = "#ddd"; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(100, 380); ctx.lineTo(800, 380); ctx.stroke();
        ctx.textAlign = "left"; ctx.fillStyle = "#000"; ctx.font = "bold 40px Arial"; 
        ctx.fillText("TU PATENTE:", 100, 460); ctx.fillStyle = "#0b3d91"; ctx.font = "bold 50px Courier New"; ctx.fillText(patente, 420, 460);
        ctx.fillStyle = "#000"; ctx.font = "bold 40px Arial"; ctx.fillText("TU PRONÓSTICO:", 100, 530);
        ctx.fillStyle = "#c62828"; ctx.font = "bold 60px Arial"; ctx.fillText(pronostico, 420, 535);
        ctx.fillStyle = "#666"; ctx.font = "30px Arial"; ctx.fillText("Emitido: " + new Date().toLocaleDateString(), 100, 600);
        ctx.fillStyle = "#f4f4f4"; ctx.fillRect(80, 650, 740, 250);
        ctx.strokeStyle = "#ffd700"; ctx.lineWidth = 5; ctx.strokeRect(80, 650, 740, 250);
        ctx.textAlign = "center"; ctx.fillStyle = "#c62828"; ctx.font = "bold 50px Arial"; ctx.fillText("🎁 ¡PREMIO!", 450, 720);
        ctx.fillStyle = "#333"; ctx.font = "bold 32px Arial"; wrapText(ctx, "Si acertás el resultado, ganás 50% OFF en tu próxima carga de GNC.", 450, 780, 700, 40);
        ctx.fillStyle = "#000"; ctx.font = "bold 35px Arial"; ctx.fillText("ESCANEAR EN PLAYA", 450, 980);
        const qrCanvas = document.querySelector("#qrcode canvas");
        if (qrCanvas) ctx.drawImage(qrCanvas, 225, 1020, 450, 450);
        ctx.strokeStyle = "#aaa"; ctx.setLineDash([15, 10]); ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(50, 1530); ctx.lineTo(850, 1530); ctx.stroke(); ctx.setLineDash([]);
        ctx.fillStyle = "#666"; ctx.font = "bold 28px Arial"; ctx.fillText("TÉRMINOS Y CONDICIONES", 450, 1580);
        const textosLegales = [
            "• Indispensable presentar este cupón para acreditar el premio.",
            "• El descuento del 50% se aplica sobre una única carga.",
            "• Promoción válida únicamente en DELTA GNC.",
            "• No acumulable con otras promociones.",
            "• La participación implica la aceptación de las bases."
        ];
        let yLegales = 1630;
        textosLegales.forEach(t => { yLegales = wrapText(ctx, t, 450, yLegales, 750, 35) + 15; });
        const link = document.createElement("a"); 
        link.download = `Cupon_Prode_DELTA_${patente}.png`;
        link.href = canvas.toDataURL("image/png"); 
        link.click();
    }
</script>
</body>
</html>
