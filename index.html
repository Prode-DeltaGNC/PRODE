<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DELTA GNC - Prode Mundialista</title>
    <style>
        :root { --celeste-afa: #74ACDF; --blanco-puro: #FFFFFF; --card-bg: rgba(16, 28, 44, 0.9); }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { 
            background: linear-gradient(-45deg, #0B131E, #1C334E, #223B5A, #0B131E);
            background-size: 400% 400%;
            animation: fondoAlbiceleste 15s ease infinite;
            margin: 0; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        @keyframes fondoAlbiceleste { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .card { background: var(--card-bg); backdrop-filter: blur(10px); padding: 30px; border-radius: 28px; width: 95%; max-width: 390px; text-align: center; border: 2px solid rgba(116, 172, 223, 0.4); color: white; }
        .brand-title { color: var(--blanco-puro); font-size: 28px; font-weight: 900; margin-bottom: 20px; }
        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 12px; font-weight: 700; color: var(--celeste-afa); margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 15px; border-radius: 14px; border: 2px solid rgba(116, 172, 223, 0.3); background: rgba(11, 19, 30, 0.7); color: white; font-size: 18px; text-align: center; text-transform: uppercase; }
        .score-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .score-row input { flex: 1; font-size: 24px; font-weight: bold; }
        .btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: 800; cursor: pointer; background: linear-gradient(135deg, #F1C40F 0%, #D4AC0D 100%); color: #111; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="card">
    <h1 class="brand-title">DELTA GNC</h1>
    <h2 style="color: var(--celeste-afa); margin-bottom: 20px;">PRODE ARGENTINA</h2>
    
    <div class="input-group">
        <label>Patente del Vehículo</label>
        <input type="text" id="patente" placeholder="AF123BK" maxlength="9">
    </div>

    <div class="score-row">
        <input type="number" id="golesArg" placeholder="ARG" min="0">
        <input type="number" id="golesRiv" placeholder="RIVAL" min="0">
    </div>

    <button class="btn" onclick="enviarProde()">Confirmar Pronóstico</button>
    <p id="mensaje" style="margin-top: 15px; font-size: 14px;"></p>
</div>

<script>
    async function enviarProde() {
        const patente = document.getElementById('patente').value.trim().toUpperCase();
        const golesArg = document.getElementById('golesArg').value;
        const golesRiv = document.getElementById('golesRiv').value;
        const msg = document.getElementById('mensaje');

        if (!patente || golesArg === "" || golesRiv === "") {
            alert("Por favor, completá todos los campos.");
            return;
        }

        try {
            // RECUERDA: Pon aquí tu IP Pública o dominio configurado en el router
            const response = await fetch('http://192.168.1.39:3002/api/guardar-prode', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ patente, golesArg, golesRiv })
            });

            if (response.ok) {
                msg.style.color = "#27ae60";
                msg.innerText = "¡Pronóstico registrado con éxito!";
            } else {
                throw new Error();
            }
        } catch (e) {
            msg.style.color = "#e74c3c";
            msg.innerText = "Error al conectar con el servidor.";
        }
    }
</script>
</body>
</html>
